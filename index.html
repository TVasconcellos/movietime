<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Roboto', sans-serif;
  background: black;
}

/* BACKGROUND */
.background {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://preview.redd.it/new-poster-for-mortal-kombat-ii-v0-vtztr88yjolg1.jpeg?width=1080&crop=smart&auto=webp&s=5a8460d4af5d5261f6c737d634a432a373446225')
              no-repeat center top / cover;
  will-change: transform;
}

/* FIRE CANVAS */
#fireCanvas {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.countdown {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

/* GRID */
#timer {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 25px;
}

/* BOX */
.time-box {
  background: rgba(0,0,0,0.1);
  padding: 30px 35px;
  border-radius: 10px;
  min-width: 120px;
}

/* BIGGER NUMBERS */
.value {
  font-size: 4.5rem;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* ANIMATION CLASS */
.value.change {
  transform: translateY(-10px);
  opacity: 0.5;
}

.unit {
  margin-top: 8px;
  font-size: 1.2rem;
  opacity: 0.8;
}

.label {
  margin-top: 25px;
  font-size: 1.6rem;
}

.play-btn {
  margin-top: 25px;
  padding: 12px 28px;
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
  background: black;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.play-btn:hover {
  transform: scale(1.05);
  background: #111;
}
</style>
</head>

<body>

<div class="background" id="bg"></div>
<canvas id="fireCanvas"></canvas>
<div class="overlay"></div>

<div class="countdown">
  <div id="timer"></div>
  <div class="label">PARA IRMOS VER O MORTAL KOMBAT 2</div>
  <button class="play-btn" onclick="toggleMusic()" id="musicBtn">PLAY</button>
</div>

<audio id="bgMusic" loop>
  <source src="mkscene.mp3" type="audio/mpeg">
</audio>

<script>
/* =========================
   COUNTDOWN (WITH ANIMATION)
========================= */

const releaseDate = new Date("2026-05-07T19:00:00");

let prev = {};

function updateTimer() {
  const now = new Date();
  const diff = releaseDate - now;

  if (diff <= 0) {
    document.getElementById("timer").innerHTML = "NOW PLAYING";
    return;
  }

  const values = {
    days: Math.floor(diff / (1000*60*60*24)),
    hours: Math.floor((diff / (1000*60*60)) % 24),
    minutes: Math.floor((diff / (1000*60)) % 60),
    seconds: Math.floor((diff / 1000) % 60)
  };

  const container = document.getElementById("timer");

  container.innerHTML = Object.keys(values).map(key => `
    <div class="time-box">
      <div class="value" id="${key}">${values[key]}</div>
      <div class="unit">${key}</div>
    </div>
  `).join("");

  // animate changes
  Object.keys(values).forEach(key => {
    if (prev[key] !== undefined && prev[key] !== values[key]) {
      const el = document.getElementById(key);
      el.classList.add("change");
      setTimeout(() => el.classList.remove("change"), 300);
    }
  });

  prev = values;
}

setInterval(updateTimer, 1000);
updateTimer();

/* =========================
   MUSIC
========================= */

const audio = document.getElementById("bgMusic");
const button = document.getElementById("musicBtn");

audio.volume = 0.2;

function toggleMusic() {
  if (audio.paused) {
    audio.play();
    button.innerText = "STOP";
  } else {
    audio.pause();
    button.innerText = "PLAY";
  }
}

/* =========================
   PARALLAX
========================= */

const bg = document.getElementById("bg");

let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

document.addEventListener("mousemove", (e) => {
  targetX = (e.clientX / window.innerWidth - 0.5) * 60;
  targetY = (e.clientY / window.innerHeight - 0.5) * 60;
});

function animate() {
  currentX += (targetX - currentX) * 0.05;
  currentY += (targetY - currentY) * 0.05;

  bg.style.transform = `translate(${currentX}px, ${currentY}px)`;

  requestAnimationFrame(animate);
}
animate();

/* =========================
   FIRE PARTICLES
========================= */

const canvas = document.getElementById("fireCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: canvas.height,
    size: Math.random() * 4 + 2,
    speedY: Math.random() * -2 - 1,
    alpha: Math.random()
  };
}

function updateFire() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (particles.length < 120) {
    particles.push(createParticle());
  }

  particles.forEach((p, i) => {
    p.y += p.speedY;
    p.alpha -= 0.01;

    ctx.fillStyle = `rgba(255, ${Math.floor(Math.random()*150)}, 0, ${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();

    if (p.alpha <= 0) particles.splice(i,1);
  });

  requestAnimationFrame(updateFire);
}

updateFire();

</script>

</body>
</html>
