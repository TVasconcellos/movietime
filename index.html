<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://preview.redd.it/new-poster-for-mortal-kombat-ii-v0-vtztr88yjolg1.jpeg?width=1080&crop=smart&auto=webp&s=5a8460d4af5d5261f6c737d634a432a373446225') no-repeat center center/cover;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6); /* dark overlay for readability */
    }

    .countdown {
      position: relative;
      color: white;
      text-align: center;
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .label {
      font-size: 1.5rem;
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="overlay"></div>

<div class="countdown">
  <div id="timer">Loading...</div>
  <div class="label">Until Release</div>
</div>

<script>
  // 🔧 SET YOUR RELEASE DATE HERE
  const releaseDate = new Date("2026-10-23T00:00:00"); // example date

  function updateTimer() {
    const now = new Date();
    const diff = releaseDate - now;

    if (diff <= 0) {
      document.getElementById("timer").innerHTML = "NOW PLAYING";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerHTML =
      `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  setInterval(updateTimer, 1000);
  updateTimer();
</script>

</body>
</html>
