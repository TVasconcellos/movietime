<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>

  <!-- Roboto 700 -->

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Roboto', sans-serif;
    }

    .background {
      position: absolute;
      width: 120%;
      height: 120%;
      top: -10%;
      left: -10%;
      background: url('https://preview.redd.it/new-poster-for-mortal-kombat-ii-v0-vtztr88yjolg1.jpeg?width=1080&crop=smart&auto=webp&s=5a8460d4af5d5261f6c737d634a432a373446225') no-repeat center center/cover;
      will-change: transform;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .countdown {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    #timer {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .label {
      margin-top: 10px;
      font-size: 1.5rem;
      opacity: 0.85;
    }

    .play-btn {
      margin-top: 25px;
      padding: 12px 28px;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      background: rgba(255, 0, 0, 0.8);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .play-btn:hover {
      background: rgba(255, 0, 0, 1);
      transform: scale(1.05);
    }
  </style>

</head>
<body>

<div class="background" id="bg"></div>
<div class="overlay"></div>

<div class="countdown">
  <div id="timer">Loading...</div>
  <div class="label">UNTIL RELEASE</div>
  <button class="play-btn" onclick="startMusic()">PLAY MUSIC</button>
</div>

<audio id="bgMusic" loop>
  <source src="mkscene.mp3" type="audio/mpeg">
</audio>

<script>
  // 🎬 Release date
  const releaseDate = new Date("2026-05-07T19:00:00");

  function updateTimer() {
    const now = new Date();
    const diff = releaseDate - now;

    if (diff <= 0) {
      document.getElementById("timer").innerHTML = "NOW PLAYING";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerHTML =
      `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  setInterval(updateTimer, 1000);
  updateTimer();

  // 🎵 Play button
  const audio = document.getElementById("bgMusic");
  audio.volume = 0.2;

  function startMusic() {
    audio.play();
  }

  // 🖱️ Smooth parallax with easing
  const bg = document.getElementById("bg");

  let targetX = 0;
  let targetY = 0;
  let currentX = 0;
  let currentY = 0;

  document.addEventListener("mousemove", (e) => {
    targetX = (e.clientX / window.innerWidth - 0.5) * 40;
    targetY = (e.clientY / window.innerHeight - 0.5) * 40;
  });

  function animate() {
    // easing
    currentX += (targetX - currentX) * 0.05;
    currentY += (targetY - currentY) * 0.05;

    bg.style.transform = `translate(${currentX}px, ${currentY}px) scale(1.08)`;

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
